name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  gdunit4:
    name: GdUnit4 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run GdUnit4 suites
        uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: "4.5.1"
          version: "v6.0.1"
          paths: "res://tests"
          warnings-as-errors: true
